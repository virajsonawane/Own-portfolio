<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('portfolio-theme')
          if (t === 'light') document.documentElement.classList.remove('dark')
          else document.documentElement.classList.add('dark')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      name="description"
      content="Viraj Sonawane — Software developer in Pune. M.Sc. Computer Science, React, .NET, Django. Portfolio, projects, and contact."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <title>Viraj Sonawane — Software Developer</title>
